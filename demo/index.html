<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxiHuman — Privacy-first Human Body Generator</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2d3046;
      --accent:     #5c8df6;
      --accent2:    #8f6bf8;
      --text:       #e4e6f0;
      --muted:      #7a7e99;
      --success:    #3ecf8e;
      --warn:       #f5a623;
      --radius:     8px;
      --panel-w:    320px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 48px 1fr auto;
      grid-template-columns: var(--panel-w) 1fr;
      grid-template-areas:
        "header  header"
        "sidebar canvas"
        "footer  footer";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .tagline {
      color: var(--muted);
      font-size: 12px;
    }

    .header .spacer { flex: 1; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--accent2) 20%, transparent);
      color: var(--accent2);
      border: 1px solid color-mix(in srgb, var(--accent2) 40%, transparent);
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .slider-group { display: flex; flex-direction: column; gap: 10px; }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-label span { font-size: 13px; }

    .slider-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Preset pills */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .preset-btn {
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .preset-btn:hover,
    .preset-btn.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
    }

    /* Export buttons */
    .export-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .export-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .export-btn:hover {
      border-color: var(--success);
      background: color-mix(in srgb, var(--success) 10%, transparent);
      color: var(--success);
    }

    .export-btn .icon { font-size: 15px; }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-chip strong { color: var(--text); }

    /* ── Canvas area ─────────────────────────────────────────────────── */
    .canvas-area {
      grid-area: canvas;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #1a1f35 0%, var(--bg) 70%);
      overflow: hidden;
    }

    #render-canvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius);
    }

    .canvas-overlay {
      position: absolute;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .fps-badge {
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      color: var(--muted);
    }

    .fps-badge strong { color: var(--success); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .loading-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 10;
    }

    .loading-screen p { color: var(--muted); font-size: 13px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .footer {
      grid-area: footer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 36px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 48px auto 1fr auto;
        grid-template-areas:
          "header"
          "sidebar"
          "canvas"
          "footer";
      }
      .sidebar { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header class="header">
      <span class="logo">OxiHuman</span>
      <span class="tagline">Privacy-first Human Body Generator</span>
      <div class="spacer"></div>
      <span class="badge">ALPHA</span>
    </header>

    <!-- ── Sidebar ────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <!-- Body parameters -->
      <div>
        <div class="section-title">Body Parameters</div>
        <div class="slider-group">

          <div class="slider-row">
            <div class="slider-label">
              <span>Height</span>
              <span class="slider-value" id="val-height">1.75 m</span>
            </div>
            <input type="range" id="sl-height" min="140" max="220" value="175"
                   aria-label="Height">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>Weight</span>
              <span class="slider-value" id="val-weight">70 kg</span>
            </div>
            <input type="range" id="sl-weight" min="40" max="160" value="70"
                   aria-label="Weight">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>Age</span>
              <span class="slider-value" id="val-age">30</span>
            </div>
            <input type="range" id="sl-age" min="18" max="90" value="30"
                   aria-label="Age">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>Muscle</span>
              <span class="slider-value" id="val-muscle">50%</span>
            </div>
            <input type="range" id="sl-muscle" min="0" max="100" value="50"
                   aria-label="Muscle mass">
          </div>

          <div class="slider-row">
            <div class="slider-label">
              <span>Body Fat</span>
              <span class="slider-value" id="val-fat">18%</span>
            </div>
            <input type="range" id="sl-fat" min="3" max="55" value="18"
                   aria-label="Body fat">
          </div>

        </div>
      </div>

      <!-- Presets -->
      <div>
        <div class="section-title">Alpha Presets</div>
        <div class="preset-grid">
          <button class="preset-btn" data-preset="athletic">Athletic</button>
          <button class="preset-btn" data-preset="slim">Slim</button>
          <button class="preset-btn" data-preset="heavy">Heavy</button>
          <button class="preset-btn" data-preset="tall">Tall</button>
          <button class="preset-btn" data-preset="short">Short</button>
          <button class="preset-btn" data-preset="reset">Reset</button>
        </div>
      </div>

      <!-- Stats -->
      <div>
        <div class="section-title">Stats</div>
        <div class="stats-row">
          <div class="stat-chip">Vertices: <strong id="stat-verts">0</strong></div>
          <div class="stat-chip">FPS: <strong id="stat-fps">0</strong></div>
          <div class="stat-chip">Mem: <strong id="stat-mem">0 KB</strong></div>
        </div>
      </div>

      <!-- Export -->
      <div>
        <div class="section-title">Export</div>
        <div class="export-group">
          <button class="export-btn" id="btn-glb">
            <span class="icon">&#x2B07;</span> Download GLB
          </button>
          <button class="export-btn" id="btn-obj">
            <span class="icon">&#x2B07;</span> Download OBJ
          </button>
          <button class="export-btn" id="btn-stl">
            <span class="icon">&#x2B07;</span> Download STL
          </button>
        </div>
      </div>

    </aside>

    <!-- ── Canvas ──────────────────────────────────────────────────── -->
    <main class="canvas-area">
      <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-msg">Initialising OxiHuman engine…</p>
      </div>

      <canvas id="render-canvas" width="800" height="600"
              aria-label="3-D body mesh preview"></canvas>

      <div class="canvas-overlay">
        <div class="status-dot" id="status-dot" style="display:none"></div>
        <div class="fps-badge">
          <strong id="fps-display">--</strong> fps
        </div>
      </div>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <footer class="footer">
      <span>
        &copy; 2026 COOLJAPAN OU (Team Kitasan) &mdash;
        Licensed under
        <a href="https://www.apache.org/licenses/LICENSE-2.0"
           target="_blank" rel="noopener">Apache-2.0</a>
      </span>
      <span>
        <a href="https://github.com/cool-japan/oxihuman"
           target="_blank" rel="noopener">GitHub</a>
        &nbsp;&mdash;&nbsp;
        <a href="https://docs.rs/oxihuman-core"
           target="_blank" rel="noopener">Docs</a>
      </span>
    </footer>

  </div><!-- /.app -->

  <script src="app.js" type="module"></script>
</body>
</html>
