# npm Publishing Workflow for OxiHuman WASM bindings
# Builds and publishes @cooljapan/oxihuman to npm using wasm-pack
#
# Copyright (c) COOLJAPAN OU (Team Kitasan)

name: npm Publish

on:
  # Manual trigger for publishing
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - npm
      npm_tag:
        description: 'npm dist-tag (e.g., latest, beta, next)'
        required: false
        default: 'latest'
        type: string

  # Trigger on release tags
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  WASM_PACK_VERSION: "0.13.1"
  SCOPE: "cooljapan"
  NPM_PACKAGE: "@cooljapan/oxihuman"
  # Size thresholds (bytes)
  WASM_SIZE_LIMIT_WARN: 5242880    # 5 MB (warning)
  WASM_SIZE_LIMIT_HARD: 15728640   # 15 MB (fail)

jobs:
  build:
    name: Build WASM packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-build-

      - name: Install wasm-pack
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked || true

      - name: Install wasm-opt (via binaryen)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version

      - name: Build for bundler target
        working-directory: crates/oxihuman-wasm
        run: >
          wasm-pack build
          --scope ${{ env.SCOPE }}
          --target bundler
          --out-dir pkg-bundler
          --release
          -- --features bindgen

      - name: Optimize WASM (bundler)
        working-directory: crates/oxihuman-wasm
        run: |
          WASM_FILE=$(find pkg-bundler -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            echo "Optimizing: $WASM_FILE"
            wasm-opt -Oz --enable-simd "$WASM_FILE" -o "$WASM_FILE"
          fi

      - name: Build for web target
        working-directory: crates/oxihuman-wasm
        run: >
          wasm-pack build
          --scope ${{ env.SCOPE }}
          --target web
          --out-dir pkg-web
          --release
          -- --features bindgen

      - name: Optimize WASM (web)
        working-directory: crates/oxihuman-wasm
        run: |
          WASM_FILE=$(find pkg-web -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            echo "Optimizing: $WASM_FILE"
            wasm-opt -Oz --enable-simd "$WASM_FILE" -o "$WASM_FILE"
          fi

      - name: Build for Node.js target
        working-directory: crates/oxihuman-wasm
        run: >
          wasm-pack build
          --scope ${{ env.SCOPE }}
          --target nodejs
          --out-dir pkg-node
          --release
          -- --features bindgen

      - name: Optimize WASM (node)
        working-directory: crates/oxihuman-wasm
        run: |
          WASM_FILE=$(find pkg-node -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            echo "Optimizing: $WASM_FILE"
            wasm-opt -Oz --enable-simd "$WASM_FILE" -o "$WASM_FILE"
          fi

      - name: Rename packages to @cooljapan/oxihuman
        working-directory: crates/oxihuman-wasm
        run: |
          for dir in pkg-bundler pkg-web pkg-node; do
            if [ -f "${dir}/package.json" ]; then
              sed -i "s|\"@${SCOPE}/oxihuman-wasm\"|\"${NPM_PACKAGE}\"|g" "${dir}/package.json"
              echo "Updated ${dir}/package.json → ${NPM_PACKAGE}"
            fi
          done

      - name: Show package info
        working-directory: crates/oxihuman-wasm
        run: |
          echo "=== bundler ==="
          cat pkg-bundler/package.json
          echo ""
          echo "=== web ==="
          cat pkg-web/package.json
          echo ""
          echo "=== node ==="
          cat pkg-node/package.json
          echo ""
          echo "=== WASM sizes ==="
          for dir in pkg-bundler pkg-web pkg-node; do
            find "${dir}" -name "*.wasm" -exec sh -c '
              FILE="$1"
              SIZE=$(wc -c < "$FILE")
              SIZE_KB=$(( SIZE / 1024 ))
              SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
              echo "  $FILE: ${SIZE_KB} KB  (${SIZE_MB} MB)"
            ' _ {} \;
          done

      - name: WASM size gate
        working-directory: crates/oxihuman-wasm
        run: |
          FAIL=0
          for dir in pkg-bundler pkg-web pkg-node; do
            for WASM_FILE in ${dir}/*.wasm; do
              [ ! -f "$WASM_FILE" ] && continue
              SIZE=$(wc -c < "$WASM_FILE")
              SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
              echo "Checking $WASM_FILE: ${SIZE} bytes (${SIZE_MB} MB)"
              if [ "$SIZE" -gt "$WASM_SIZE_LIMIT_WARN" ]; then
                echo "  WARNING: exceeds warning threshold of 5 MB"
              fi
              if [ "$SIZE" -gt "$WASM_SIZE_LIMIT_HARD" ]; then
                echo "  FAIL: exceeds hard limit of 15 MB"
                FAIL=1
              else
                echo "  PASS: within 15 MB hard limit"
              fi
            done
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

      - name: Upload bundler package
        uses: actions/upload-artifact@v4
        with:
          name: npm-pkg-bundler
          path: crates/oxihuman-wasm/pkg-bundler/

      - name: Upload web package
        uses: actions/upload-artifact@v4
        with:
          name: npm-pkg-web
          path: crates/oxihuman-wasm/pkg-web/

      - name: Upload node package
        uses: actions/upload-artifact@v4
        with:
          name: npm-pkg-node
          path: crates/oxihuman-wasm/pkg-node/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download bundler package
        uses: actions/download-artifact@v4
        with:
          name: npm-pkg-bundler
          path: pkg-bundler

      - name: Show package contents
        run: |
          echo "=== package.json ==="
          cat pkg-bundler/package.json
          echo ""
          echo "=== Files ==="
          ls -la pkg-bundler/

      # Dry run (default for workflow_dispatch, or RC tags)
      - name: Publish (dry-run)
        if: >-
          github.event.inputs.publish_target == 'dry-run' ||
          (github.event_name == 'push' && contains(github.ref, 'rc'))
        working-directory: pkg-bundler
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish to npm
      - name: Publish to npm
        if: >-
          github.event.inputs.publish_target == 'npm' ||
          (github.event_name == 'push' && !contains(github.ref, 'rc'))
        working-directory: pkg-bundler
        run: |
          NPM_TAG="${{ github.event.inputs.npm_tag || 'latest' }}"
          echo "Publishing ${NPM_PACKAGE} with tag: ${NPM_TAG}"
          npm publish --access public --tag "${NPM_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        if: github.event.inputs.publish_target == 'npm' || (github.event_name == 'push' && !contains(github.ref, 'rc'))
        run: |
          sleep 10
          npm view ${{ env.NPM_PACKAGE }} version
