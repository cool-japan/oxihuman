name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Validate (test + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-validate"

      - name: cargo test --all-features
        run: cargo test --all-features

      - name: cargo check --all-features
        run: cargo check --all-features

  build-wasm:
    name: Build WASM (web + nodejs)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-wasm"

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Install wasm-opt (via binaryen)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends binaryen
          wasm-opt --version

      - name: wasm-pack build (web target)
        working-directory: crates/oxihuman-wasm
        run: >
          wasm-pack build
          --target web
          --release
          --out-dir pkg-web
          -- --features web

      - name: Optimize WASM (web)
        working-directory: crates/oxihuman-wasm
        run: |
          WASM_FILE=$(find pkg-web -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            wasm-opt -Oz --enable-simd "$WASM_FILE" -o "$WASM_FILE"
          fi

      - name: wasm-pack build (nodejs target)
        working-directory: crates/oxihuman-wasm
        run: >
          wasm-pack build
          --target nodejs
          --release
          --out-dir pkg-nodejs
          -- --features nodejs

      - name: Optimize WASM (nodejs)
        working-directory: crates/oxihuman-wasm
        run: |
          WASM_FILE=$(find pkg-nodejs -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            wasm-opt -Oz --enable-simd "$WASM_FILE" -o "$WASM_FILE"
          fi

      - name: Package WASM artifacts
        working-directory: crates/oxihuman-wasm
        run: |
          TAG="${GITHUB_REF_NAME}"
          tar czf "oxihuman-wasm-web-${TAG}.tar.gz" pkg-web/
          tar czf "oxihuman-wasm-nodejs-${TAG}.tar.gz" pkg-nodejs/
          ls -lh oxihuman-wasm-*.tar.gz

      - name: Upload WASM release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release-artifacts
          path: crates/oxihuman-wasm/oxihuman-wasm-*.tar.gz
          retention-days: 30

  publish-dry-run:
    name: Publish Dry Run (all 8 crates)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-publish-dry"

      # Publish order respects intra-workspace dependency graph:
      # oxihuman-core (no workspace deps)
      # oxihuman-morph -> core
      # oxihuman-mesh  -> core
      # oxihuman-physics -> core, mesh
      # oxihuman-export  -> core, mesh, morph
      # oxihuman-viewer  -> core, mesh, morph, export
      # oxihuman-wasm    -> core, morph, mesh, export, viewer
      # oxihuman-cli     -> core, morph, mesh, export, viewer

      - name: cargo publish --dry-run (oxihuman-core)
        run: cargo publish --dry-run -p oxihuman-core

      - name: cargo publish --dry-run (oxihuman-morph)
        run: cargo publish --dry-run -p oxihuman-morph

      - name: cargo publish --dry-run (oxihuman-mesh)
        run: cargo publish --dry-run -p oxihuman-mesh

      - name: cargo publish --dry-run (oxihuman-physics)
        run: cargo publish --dry-run -p oxihuman-physics

      - name: cargo publish --dry-run (oxihuman-export)
        run: cargo publish --dry-run -p oxihuman-export

      - name: cargo publish --dry-run (oxihuman-viewer)
        run: cargo publish --dry-run -p oxihuman-viewer

      - name: cargo publish --dry-run (oxihuman-wasm)
        run: cargo publish --dry-run -p oxihuman-wasm

      - name: cargo publish --dry-run (oxihuman-cli)
        run: cargo publish --dry-run -p oxihuman-cli

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-wasm, publish-dry-run]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download WASM release artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-release-artifacts
          path: release-artifacts/

      - name: Generate changelog from git log
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${TAG}")
          fi
          # Write changelog to a temp file so multiline is handled cleanly
          printf '%s\n' "$CHANGES" > /tmp/changelog.txt
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="${{ steps.changelog.outputs.prev_tag }}"
          RANGE_LABEL="${PREV_TAG:+${PREV_TAG}..}${TAG}"

          gh release create "${TAG}" \
            --title "OxiHuman ${TAG}" \
            --notes-file /tmp/changelog.txt \
            --verify-tag \
            release-artifacts/*.tar.gz
