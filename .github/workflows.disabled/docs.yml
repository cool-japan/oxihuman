name: Docs

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-deploy:
    name: Build and Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "docs"

      - name: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "--enable-index-page -Zunstable-options"
        run: cargo doc --all-features --no-deps

      - name: Add redirect index.html at root
        run: |
          cat > target/doc/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=oxihuman_core/index.html">
              <title>OxiHuman Documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="oxihuman_core/index.html">OxiHuman docs</a>…</p>
            </body>
          </html>
          HTML

      - name: Add .nojekyll to bypass Jekyll processing
        run: touch target/doc/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/doc
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy rustdoc from ${{ github.sha }}"
